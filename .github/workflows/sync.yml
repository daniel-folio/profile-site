# .github/workflows/sync.yml

name: Sync to A Repository & Deploy

on:
  push:
    branches:
      - main   # B 저장소의 메인 브랜치

jobs:
  sync-and-deploy:
    if: github.repository_owner == 'daniel-folio'
    runs-on: ubuntu-latest
    steps:
      # 1. B 저장소(소스) 코드를 가져옴
      - name: Checkout B Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # 2. PAT를 사용하여 A 저장소(대상)로 Push (Vercel 배포 차단 우회를 위해 커밋 작성자 세탁)
      - name: Push to A Repo (daniel-works0001)
        run: |
          git config --global user.name "daniel-works0001"
          git config --global user.email "daniel-works0001@users.noreply.github.com"
          git commit --amend --reset-author --no-edit
          git remote add repoA https://${{ secrets.A_REPO_PAT }}@github.com/daniel-works0001/portfolio.git
          git push -f repoA HEAD:refs/heads/main

      # 3. 추가된 daniel-dataflow 저장소로 Push 배포 (커밋 히스토리 보존)
      - name: Push to B Repo (daniel-dataflow)
        run: |
          git remote add repoB https://${{ secrets.DATAFLOW_REPO_PAT }}@github.com/daniel-dataflow/portfolio-website.git
          git push -f repoB HEAD:refs/heads/main

      
      # 4. 작업 실패 시 Slack 알림
      - name: Send Failure Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo, commit, author, action, workflow
          custom_payload: |
            {
              attachments: [{
                color: 'danger',
                title: `🚨 [${{ github.repository }}] 동기화 또는 배포 실패`,
                text: `워크플로우 실행 로그를 확인해주세요: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}